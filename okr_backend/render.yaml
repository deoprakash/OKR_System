services:
  - type: web
    name: okr-backend
    env: node
    plan: free
    region: oregon
    branch: main
    # Build and start commands for a Node service (no Docker)
    buildCommand: "npm install --production"
    startCommand: "npm start"

# Note: Do NOT commit secrets to this file. Set `MONGODB_URI`, `PORT`, and `CLIENT_ORIGIN`
# in the Render dashboard (Environment > Environment Vars) after connecting your Git repo.
# If your repository contains multiple services, when creating the Render service in the
# dashboard set the "Root directory" to `okr_backend` so Render uses the correct folder.
